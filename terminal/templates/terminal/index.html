{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Terminal</title>
    <link rel="stylesheet" href="{% static 'terminal/terminal.css' %}">
</head>

<body>
    <div class="title">AI WELLNESS TERMINAL</div>
    <div class="subtitle">your daily companion for mental and physical wellbeing</div>
    <div class="window">
        <div class="window-header">
            <div class="window-buttons">
                <span class="window-close" id="closeButton"></span>
                <span class="window-maximize" id="maximizeButton"></span>
                <span class="window-minimize" id="minimizeButton"></span>
            </div>
            <div class="window-title">wellness-terminal - {user}</div>
            <div class="window-status">● connected</div>
        </div>
        <div class="window-body">
            <div class="session-start" id="sessionStart"></div> 
            <div class="command-line">
                <span class="sign">❯</span>
                <input type="text" id="terminalInput" class="terminal-input" placeholder="type a command" autofocus>
            </div>
        </div>
    </div>
    <div class="streak">streak: </div>

    <script src="{% static 'terminal/terminal.js' %}"></script>
</body>
</html>
